        <!-- RIGHT: Robot (REPLACES anything else) -->
        <div class="robot">
        <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.73/build/spline-viewer.js"></script>
            <spline-viewer url="https://prod.spline.design/mZZPb8GE2o0XXnjt/scene.splinecode"></spline-viewer>
        </div>

    </div>

    <script>
    const robot = document.querySelector('.robot');

    let mouseX = 0;
    let mouseY = 0;
    let currentX = 0;
    let currentY = 0;

    document.addEventListener("mousemove", (e) => {
        mouseX = (window.innerWidth / 2 - e.clientX) / 20;
        mouseY = (window.innerHeight / 2 - e.clientY) / 20;
    });

    function animate() {
        currentX += (mouseX - currentX) * 0.1;
        currentY += (mouseY - currentY) * 0.1;

        robot.style.transform = `translate(${currentX}px, ${currentY}px)`;

        requestAnimationFrame(animate);
    }

    animate();
    </script>
